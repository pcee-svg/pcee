<style>
  :root {
    --blau: #1a5b9e;
    --blau-fosc: #0f3a66;
    --blau-clar: #e8f1fa;
    --gris: #5a6570;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f7f9fb;
    min-height: 100vh;
    color: #1c1c1c;
    padding-bottom: 40px;
  }
  header {
    background: var(--blau);
    padding: 16px 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header a.back {
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
  }
  header a.back svg { width: 22px; height: 22px; stroke: #fff; }
  header h1 {
    color: #fff;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .search-wrap {
    max-width: 480px;
    margin: 14px auto 0;
    padding: 0 16px;
  }
  .search-box {
    position: relative;
  }
  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: var(--gris);
  }
  .search-box input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border-radius: 12px;
    border: 1px solid #dde3e9;
    font-size: 0.95rem;
    background: #fff;
    outline: none;
  }
  .search-box input:focus {
    border-color: var(--blau);
  }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .count {
    font-size: 0.8rem;
    color: var(--gris);
    padding: 0 2px 2px;
  }
  .contact-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(15,58,102,0.06);
    border: 1px solid rgba(26,91,158,0.07);
  }
  .contact-card h2 {
    font-size: 0.98rem;
    color: var(--blau-fosc);
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.86rem;
    color: #333;
    padding: 3px 0;
  }
  .contact-row svg {
    width: 15px;
    height: 15px;
    stroke: var(--blau);
    flex-shrink: 0;
  }
  .contact-row a {
    color: #333;
    text-decoration: none;
    word-break: break-word;
  }
  .contact-row a:active { color: var(--blau); }
  .contact-row .label {
    color: var(--gris);
    font-size: 0.78rem;
    min-width: 78px;
  }
  .no-results {
    text-align: center;
    color: var(--gris);
    padding: 40px 20px;
    font-size: 0.9rem;
  }
</style>

function normalitza(text) {
  return (text || '')
    .toString()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function render(llista) {
  const results = document.getElementById('results');
  const count = document.getElementById('count');
  count.textContent = llista.length + ' consells esportius';

  if (llista.length === 0) {
    results.innerHTML = '<div class="no-results">No s\'ha trobat cap resultat</div>';
    return;
  }

  results.innerHTML = llista.map(c => {
    const tfnHref = (c['Tfn comissionat'] || '').replace(/[^\d+]/g, '');
    return `
      <div class="contact-card">
        <h2>${escapeHtml(c.Consell)}</h2>
        ${c.Email ? `
        <div class="contact-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <span class="label">Consell:</span>
          <a href="mailto:${escapeHtml(c.Email)}">${escapeHtml(c.Email)}</a>
        </div>` : ''}
        ${c.Comissionat ? `
        <div class="contact-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="label">Comissionat:</span>
          <span>${escapeHtml(c.Comissionat)}</span>
        </div>` : ''}
        ${c['Email comissionat'] ? `
        <div class="contact-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <span class="label">Email:</span>
          <a href="mailto:${escapeHtml(c['Email comissionat'])}">${escapeHtml(c['Email comissionat'])}</a>
        </div>` : ''}
        ${c['Tfn comissionat'] ? `
        <div class="contact-row">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span class="label">Tel:</span>
          <a href="tel:${tfnHref}">${escapeHtml(c['Tfn comissionat'])}</a>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

document.getElementById('search').addEventListener('input', (e) => {
  const q = normalitza(e.target.value);
  if (!q) {
    render(contactes);
    return;
  }
  const filtrats = contactes.filter(c =>
    normalitza(c.Consell).includes(q) ||
    normalitza(c.Comissionat).includes(q)
  );
  render(filtrats);
});

render(contactes);
